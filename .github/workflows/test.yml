# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — Angular 19 Test Framework
#
# Jobs run in PARALLEL to minimise wall-clock time:
#   unit-integration  →  Vitest (all spec files) + coverage report
#   e2e               →  Playwright (Chromium) against ng serve --configuration=test
#
# Vitest and Playwright run independently — no shared state.
# MSW handlers.ts is the single API mock source used by both.
# ─────────────────────────────────────────────────────────────────────────────
name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:

  # ── Job 1: Unit + Integration (Vitest) ────────────────────────────────────
  unit-integration:
    name: Unit + Integration Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npm run test:coverage

      # Upload coverage to Codecov (optional — remove if not using Codecov)
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unit-integration
          fail_ci_if_error: false

      # Always upload coverage HTML report so developers can inspect failures
      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 14

  # ── Job 2: E2E (Playwright) ────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright — Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache Playwright browser binaries between runs
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system dependencies (cached hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build Angular app (test configuration)
        # Pre-build so ng serve starts faster in the webServer block
        run: npx ng build --configuration=test

      - name: Run Playwright tests
        run: npm run e2e
        env:
          CI: true

      # Always upload Playwright report — viewable even on failure
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      # Upload test traces for debugging flaky tests
      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # ── Job 3: Enforce passing (required status check for PRs) ─────────────────
  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [unit-integration, e2e]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.unit-integration.result }}" != "success" ]; then
            echo "❌ Unit/Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "❌ E2E tests failed"
            exit 1
          fi
          echo "✅ All tests passed"
